<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="form.css">
    <title>Formulário</title>
</head>
<body>
    
    <form class="container">

        <div class="fund">
            <h1>Login</h1>
            <div class="form-group">
                <button class="form-input" type="button"><img src="img/google.png" class="icon" alt="Google">Continuar com o Google</button>
            </div>

            <div class="form-group">
                <button class="form-input" type="button"> <img src="img/facebook.png" alt="Facebook" class="icon">Continuar com o Facebook</button>
            </div>

            <p>Ou</p>

            <div class="form-group">
                <input class="form-input" type="email" id="email" name="email" placeholder="Email">
            </div>

            <div class="form-group">
                <input class="form-input" type="password" id="senha" name="senha" placeholder="Senha">
            </div>

            <div class="form-group">
                <button class="form-input highlight" type="button">Sign in</button>
            </div>
        </div>
        
    </form>

</body>
</html>
