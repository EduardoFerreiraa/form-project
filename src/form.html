<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="form.css">
    <title>Formulário</title>
</head>
<body>
    
    <form class="container">

        <h1>Sign in</h1>
        <div>
            <div class="form-group">
                <button class="form-input" type="button">Continuar com o Google</button>
            </div>

            <div class="form-group">
                <button class="form-input" type="button">Continuar com o Facebook</button>
            </div>

            <p>Ou</p>

            <div class="form-group">
                <input class="form-input" type="email" id="email" name="email" placeholder="Digite seu nome">
            </div>

            <div class="form-group">
                <input class="form-input" type="password" id="senha" name="senha" placeholder="Digite seu nome">
            </div>

            <div class="form-group">
                <button class="form-input" type="button">Sign in</button>
            </div>
        </div>
        

    </form>

</body>
</html>
