<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="form.css">
    <title>Formulário</title>
</head>
<body>
    
    <form class="container">
        
        <div class="form-group">
            <button type="button">Continuar com o Google</button>
        </div>

        <div class="form-group">
            <button type="button">Continuar com o Facebook</button>
        </div>

        <div class="form-group">
            <input type="email" id="email" name="email" placeholder="Digite seu nome">
        </div>

        <div class="form-group">
            <input type="password" id="senha" name="senha" placeholder="Digite seu nome">
        </div>

        <div class="form-group">
            <button type="button">Sign in</button>
        </div>

    </form>

</body>
</html>
